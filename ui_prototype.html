<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌面语音助手 UI 原型</title>
    <style>
        :root {
            /* 暗色模式配色 */
            --primary-color: #818cf8; /* Indigo 400 */
            --primary-dark: #4f46e5; /* Indigo 600 */
            --bg-color: #0f172a; /* Slate 900 */
            --chat-bg: #1e293b; /* Slate 800 */
            --text-primary: #f1f5f9; /* Slate 100 */
            --text-secondary: #94a3b8; /* Slate 400 */
            
            --user-bubble-bg: #4f46e5; /* Indigo 600 */
            --user-text: #ffffff;
            
            --ai-bubble-bg: #334155; /* Slate 700 */
            --ai-summary-bg: #312e81; /* Indigo 900 */
            --ai-summary-text: #e0e7ff; /* Indigo 100 */
            --ai-summary-border: #4338ca; /* Indigo 700 */
            
            --border-radius: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3), 0 4px 6px -2px rgb(0 0 0 / 0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        .app-container {
            width: 100%;
            height: 100%;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 顶部标题栏 */
        .header {
            padding: 16px 24px;
            background: rgba(30, 41, 59, 0.85); /* Slate 800 transparent */
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background-color: #059669; /* Emerald 600 */
            color: #ecfdf5; /* Emerald 50 */
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .device-select {
            background-color: rgba(30, 41, 59, 0.5);
            color: var(--text-secondary);
            border: 1px solid #334155;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
            max-width: 150px;
        }

        .device-select:focus {
            border-color: var(--primary-color);
            color: var(--text-primary);
        }

        .btn-update {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-update:hover {
            background-color: rgba(129, 140, 248, 0.1);
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 100px; /* 为悬浮按钮留出空间 */
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* 消息行容器 */
        .message-row {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-row.ai {
            align-self: flex-start;
        }

        /* 头像 */
        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 15px;
            border: 1px solid #475569;
            margin-top: 2px;
        }

        .avatar.user {
            background-color: var(--primary-dark);
            color: white;
            border: none;
        }

        .avatar.ai {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
        }

        /* 消息气泡基础样式 */
        .bubble {
            padding: 6px 12px;
            border-radius: var(--border-radius);
            position: relative;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: var(--shadow-sm);
        }

        /* 用户气泡 */
        .user .bubble {
            background-color: var(--user-bubble-bg);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        /* AI 气泡 (复合结构) */
        .ai .bubble-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        /* AI 总结部分 (第一句) */
        .ai-summary-card {
            background-color: var(--ai-summary-bg);
            border: 1px solid var(--ai-summary-border);
            color: var(--ai-summary-text);
            padding: 6px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }

        .ai-summary-icon {
            font-size: 18px;
            margin-top: 0;
            display: flex;
            align-items: center;
        }

        /* AI 详细部分 */
        .ai-detail-card {
            background-color: var(--ai-bubble-bg);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 16px;
            border-top-left-radius: 4px;
            font-size: 14px;
            border: 1px solid #475569;
        }

        .ai-detail-card p {
            margin: 8px 0;
        }
        .ai-detail-card p:first-child {
            margin-top: 0;
        }
        .ai-detail-card ul, .ai-detail-card ol {
            padding-left: 18px;
            margin: 6px 0;
        }
        .ai-detail-card li {
            margin-bottom: 4px;
        }
        .ai-detail-card blockquote {
            margin: 8px 0;
            padding-left: 10px;
            border-left: 3px solid #475569;
            color: #94a3b8;
        }
        
        /* 代码块样式适配暗色 */
        /* Inline code */
        code {
            background-color: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, Monaco, 'Andale Mono', monospace;
            color: #e2e8f0;
            border: 1px solid #334155;
        }

        /* Block code wrapper */
        .code-block-wrapper {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            margin: 12px 0;
            overflow: hidden;
        }

        .code-block-header {
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-lang {
            font-size: 12px;
            color: #94a3b8;
            font-family: monospace;
            font-weight: bold;
            text-transform: uppercase;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background-color: #334155;
            color: #f1f5f9;
        }

        .code-block-wrapper pre {
            margin: 0;
            padding: 12px;
            overflow-x: auto;
        }

        /* Override inline code style when inside pre */
        .code-block-wrapper pre code {
            background-color: transparent;
            border: none;
            padding: 0;
            color: #e2e8f0;
            font-size: 13px;
        }

        /* 底部悬浮麦克风 */
        .floating-mic-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none; /* 让点击穿透到下方，除了按钮本身 */
        }

        .btn-mic {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary-dark);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.5);
            pointer-events: auto; /* 恢复按钮点击 */
        }

        .btn-mic:hover {
            transform: scale(1.1);
            background-color: #4338ca;
        }

        .btn-mic.recording {
            background-color: #ef4444;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 1.5s infinite;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 滚动条美化 (Dark) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Utility */
        .hidden { display: none !important; }

        /* Mode Toggle Button */
        .btn-icon {
            background: transparent;
            border: 1px solid #334155;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-right: 8px;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            background-color: #334155;
            color: var(--text-primary);
        }

        /* Text Input Area */
        .text-input-area {
            background-color: var(--chat-bg);
            padding: 16px 24px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            z-index: 20;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .text-input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            height: 42px;
            box-sizing: border-box;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        .text-input:focus {
            border-color: var(--primary-color);
        }

        .btn-send {
            background-color: var(--primary-dark);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
            height: 42px; /* Match input min-height roughly */
            display: flex;
            align-items: center;
        }

        .btn-send:hover {
            background-color: #4338ca;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- 顶部 -->
        <div class="header">
            <div class="header-left">
                <div class="header-title">
                    <span id="assistantIcon" style="font-size: 20px;">💤</span> 桌面语音助手
                </div>
                <button id="modeToggleBtn" class="btn-icon" title="切换到文字模式" onclick="toggleInputMode()">
                    ⌨️
                </button>
                <select id="micSelect" class="device-select" title="选择麦克风设备">
                    <option value="">加载设备中...</option>
                </select>
                <div id="statusBadge" class="status-badge">● 监听中</div>
            </div>
            
            <button class="btn-update" onclick="alert('触发更新知识库...')">
                <span style="font-size: 14px;">↻</span> 更新知识库
            </button>
        </div>

        <!-- 聊天区 -->
        <div class="chat-area" id="chatArea">
            
            <!-- 欢迎消息 -->
            <div class="message-row ai">
                <div class="avatar ai">AI</div>
                <div class="bubble-container">
                    <div class="ai-summary-card">
                        <span class="ai-summary-icon">👋</span>
                        <span>你好！我是你的智能桌面助手。</span>
                    </div>
                </div>
            </div>

            <!-- 填充底部空间，确保内容不被麦克风遮挡 -->
            <div style="height: 20px;"></div>

        </div>

        <!-- 底部输入框 (文字模式) -->
        <div class="text-input-area hidden" id="textInputArea">
            <textarea id="messageInput" class="text-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
            <button id="sendBtn" class="btn-send" onclick="sendText()">
                <span style="margin-right: 6px;">📤</span> 发送
            </button>
        </div>
    </div>

    <script src="js/qwebchannel.js"></script>
    <script src="js/marked.min.js"></script>
    <script src="js/echarts.min.js"></script>
    
    <!-- MathJax 3 Configuration -->
    <script>
    window.MathJax = {
      tex: {
        inlineMath:  [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: { fontCache: 'global' },
      startup: {
        pageReady: () => {
            console.log('MathJax is ready to process page');
            return MathJax.startup.defaultPageReady();
        }
      }
    };
    </script>
    <!-- 使用本地 MathJax (已下载到 js/mathjax.min.js) -->
    <script async id="MathJax-script" src="js/mathjax.min.js"
        onload="console.log('Local MathJax script loaded successfully')"
        onerror="console.error('Failed to load local MathJax script. Please check js/mathjax.min.js')"></script>
    
    <script>
        let backend = null;
        
        // Configure Marked Renderer for Custom Code Blocks
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const lang = (language || 'text').trim();
            
            if (lang === 'echarts') {
                const chartId = 'chart_' + Math.random().toString(36).substr(2, 9);
                // Use encodeURIComponent to safely store JSON in attribute
                const encodedOption = encodeURIComponent(code);
                return `
                <div class="echarts-chart-container" 
                     id="${chartId}" 
                     style="width: 100%; height: 400px; margin: 12px 0; border: 1px solid #334155; border-radius: 8px;"
                     data-option="${encodedOption}">
                </div>`;
            }

            // Escape code to prevent HTML injection
            const escapedCode = code.replace(/&/g, "&amp;")
                                    .replace(/</g, "&lt;")
                                    .replace(/>/g, "&gt;")
                                    .replace(/"/g, "&quot;")
                                    .replace(/'/g, "&#039;");
            
            return `
        <div class="code-block-wrapper">
            <div class="code-block-header">
                <span class="code-lang">${lang}</span>
                <button class="copy-btn" onclick="copyCode(this)">
                    <span>📋</span> 复制
                </button>
            </div>
            <pre><code class="language-${lang}">${escapedCode}</code></pre>
        </div>
        `;
        };

        marked.setOptions({
            renderer: renderer,
            highlight: null,
            breaks: true
        });

        // Copy Code Function
        window.copyCode = function(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const code = wrapper.querySelector('code').innerText;
            
            // Create a temporary textarea to copy text
            const textarea = document.createElement('textarea');
            textarea.value = code;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                const originalContent = btn.innerHTML;
                btn.innerHTML = '<span>✅</span> 已复制';
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                }, 2000);
            } catch (err) {
                console.error('Failed to copy', err);
                btn.innerHTML = '<span>❌</span> 失败';
            }
            
            document.body.removeChild(textarea);
        };
        
        // Initialize WebChannel
        new QWebChannel(qt.webChannelTransport, function(channel) {
            backend = channel.objects.backend;
        });

        // Chat helper functions
        const chatArea = document.getElementById('chatArea');

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function createMessageRow(role) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}`;
            avatar.textContent = role === 'user' ? '我' : 'AI';
            
            row.appendChild(avatar);
            
            if (role === 'user') {
                // User: Avatar is last (flex-direction: row-reverse handled by CSS)
            } else {
                // AI: Avatar is first
            }
            
            return { row, avatar };
        }

        // Add User Message
        function addUserMessage(text) {
            const { row, avatar } = createMessageRow('user');
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            
            row.appendChild(bubble); // row-reverse makes this first
            row.appendChild(avatar);
            
            chatArea.appendChild(row);
            scrollToBottom();
        }

        // Streaming AI Message Handling
        let currentAiContainer = null;
        let currentAiSummary = null;
        let currentAiDetail = null;
        let currentFullText = "";

        function startAiMessage() {
            const { row, avatar } = createMessageRow('ai');
            
            const container = document.createElement('div');
            container.className = 'bubble-container';
            
            row.appendChild(avatar);
            row.appendChild(container);
            
            chatArea.appendChild(row);
            
            currentAiContainer = container;
            currentAiSummary = null;
            currentAiDetail = null;
            currentFullText = "";
            scrollToBottom();
        }

        function appendAiStream(chunk) {
            if (!currentAiContainer) return;
            
            currentFullText += chunk;
            
            // Split by newline to separate summary and detail
            const lines = currentFullText.split('\n');
            const summaryText = lines[0];
            const detailText = lines.slice(1).join('\n');
            
            // Update Summary
            if (!currentAiSummary) {
                currentAiSummary = document.createElement('div');
                currentAiSummary.className = 'ai-summary-card';
                
                const icon = document.createElement('span');
                icon.className = 'ai-summary-icon';
                icon.textContent = '💡'; // Default icon
                
                const textSpan = document.createElement('span');
                currentAiSummary.appendChild(icon);
                currentAiSummary.appendChild(textSpan);
                
                currentAiContainer.appendChild(currentAiSummary);
            }
            currentAiSummary.querySelector('span:not(.ai-summary-icon)').textContent = summaryText;
            
            // Update Detail if exists
            if (detailText.trim().length > 0) {
                if (!currentAiDetail) {
                    currentAiDetail = document.createElement('div');
                    currentAiDetail.className = 'ai-detail-card';
                    currentAiContainer.appendChild(currentAiDetail);
                }
                
                // Protect Math
                const mathMap = new Map();
                let mathId = 0;
                
                let protectedText = detailText;

                // Protect block math $$...$$
                protectedText = protectedText.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
                    const id = `MATH_BLOCK_SS_${mathId++}_END`;
                    mathMap.set(id, match); // Store original match including $$
                    return id;
                });
                
                // Protect block math \[...\]
                protectedText = protectedText.replace(/\\\[([\s\S]+?)\\\]/g, (match, p1) => {
                    const id = `MATH_BLOCK_SB_${mathId++}_END`;
                    mathMap.set(id, match);
                    return id;
                });

                // Protect inline math \(...\)
                protectedText = protectedText.replace(/\\\(([\s\S]+?)\\\)/g, (match, p1) => {
                    const id = `MATH_INLINE_P_${mathId++}_END`;
                    mathMap.set(id, match);
                    return id;
                });
                
                // Protect inline math $...$
                protectedText = protectedText.replace(/\$([^$\n]+?)\$/g, (match, p1) => {
                    const id = `MATH_INLINE_D_${mathId++}_END`;
                    mathMap.set(id, match);
                    return id;
                });
 
                // Parse Markdown
                let html = marked.parse(protectedText);
                
                // Restore Math (Directly, no escaping)
                mathMap.forEach((original, key) => {
                    html = html.replace(key, () => original);
                });

                currentAiDetail.innerHTML = html;
                
                // Render Math with MathJax
                // 移除流式渲染，避免频繁重绘导致的状态丢失
                // if (window.MathJax && window.MathJax.typesetPromise) {
                //    window.MathJax.typesetPromise([currentAiDetail])
                //        .catch((err) => console.log('MathJax error:', err));
                // }
            }
            
            scrollToBottom();
        }

        function endAiMessage() {
            // 最终渲染：在消息接收完毕后统一渲染公式，确保稳定性
            if (currentAiDetail) {
                if (window.MathJax && window.MathJax.typesetPromise) {
                     window.MathJax.typesetPromise([currentAiDetail])
                        .catch((err) => console.log('MathJax final render error:', err));
                }

                // Initialize ECharts
                const charts = currentAiDetail.querySelectorAll('.echarts-chart-container');
                charts.forEach(container => {
                    if (container.getAttribute('data-initialized') === 'true') return;
                    
                    try {
                        const optionStr = decodeURIComponent(container.getAttribute('data-option'));
                        let option;
                        try {
                            option = JSON.parse(optionStr);
                        } catch (e) {
                            console.warn("Standard JSON parse failed, attempting JS evaluation (for functions/comments)...");
                            // Allow non-strict JSON (e.g. unquoted keys, functions)
                            // This enables ECharts features like formatter functions and color callbacks
                            option = new Function('return ' + optionStr)();
                        }
                        
                        // --- Auto-Correction Logic for Parameter-Style Output ---
                        // Check if the LLM outputted tool parameters (chart_type, data, etc.) instead of an ECharts option
                        if (option.chart_type && (typeof option.title === 'string')) {
                            console.warn("Detected parameter-style JSON from LLM, auto-converting to ECharts option...");
                            
                            // 1. Parse Data
                            let labels = [];
                            let values = [];
                            let rawData = option.data;
                            
                            try {
                                if (typeof rawData === 'string') {
                                    rawData = JSON.parse(rawData);
                                }
                                
                                if (Array.isArray(rawData)) {
                                     // Handle list input e.g. [{"name": "A", "value": 10}]
                                     if (rawData.length > 0) {
                                        const firstItem = rawData[0];
                                        const keys = Object.keys(firstItem);
                                        // Heuristic matching
                                        const valKey = keys.find(k => ['value', 'values', 'count', 'amount', 'num', 'number', 'sales', 'total', 'score', 'price'].includes(k.toLowerCase())) || keys[keys.length-1];
                                        const lblKey = keys.find(k => ['name', 'label', 'category', 'type', 'x', 'date', 'year', 'quarter', 'month', 'day', 'region', 'city'].includes(k.toLowerCase())) || keys[0];
                                        
                                        rawData.forEach(item => {
                                            labels.push(item[lblKey] || '');
                                            values.push(item[valKey] || 0);
                                        });
                                     }
                                } else if (typeof rawData === 'object') {
                                     if (rawData.labels && rawData.values) {
                                         labels = rawData.labels;
                                         values = rawData.values;
                                     } else {
                                         labels = Object.keys(rawData);
                                         values = Object.values(rawData);
                                     }
                                }
                            } catch (e) {
                                console.error("Data parsing failed during auto-correction", e);
                            }
                            
                            // Fallback if parsing failed or empty
                            if (labels.length === 0 && Array.isArray(rawData)) {
                                 // Simple map fallback
                                 labels = rawData.map(x => x.name || x.label || Object.keys(x)[0]);
                                 values = rawData.map(x => x.value || Object.values(x)[0]);
                            }

                            // 2. Construct Valid Option
                            const newOption = {
                                title: {
                                    text: option.title,
                                    left: "center",
                                    textStyle: { color: "#f1f5f9" }
                                },
                                tooltip: { trigger: option.chart_type === 'pie' ? "item" : "axis" },
                                legend: {
                                    orient: "vertical",
                                    left: "left",
                                    textStyle: { color: "#94a3b8" }
                                },
                                series: []
                            };

                            if (['bar', 'line'].includes(option.chart_type)) {
                                newOption.xAxis = {
                                    type: "category",
                                    data: labels,
                                    name: option.x_label || "",
                                    axisLabel: { color: "#94a3b8" },
                                    axisLine: { lineStyle: { color: "#475569" } }
                                };
                                newOption.yAxis = {
                                    type: "value",
                                    name: option.y_label || "",
                                    axisLabel: { color: "#94a3b8" },
                                    splitLine: { lineStyle: { color: "#334155" } }
                                };
                                newOption.series.push({
                                    data: values,
                                    type: option.chart_type,
                                    itemStyle: { color: "#6366f1" }
                                });
                            } else if (option.chart_type === 'pie') {
                                const pieData = labels.map((l, i) => ({ name: l, value: values[i] }));
                                newOption.series.push({
                                    type: "pie",
                                    radius: "50%",
                                    data: pieData,
                                    label: { color: "#f1f5f9" }
                                });
                            }
                            
                            option = newOption; // Replace with corrected option
                        }
                        // -----------------------------------------------------------
                        
                        // Basic Dark Mode Adaptation
                        if (!option.backgroundColor) option.backgroundColor = 'transparent';
                        if (!option.textStyle) option.textStyle = {};
                        if (!option.textStyle.color) option.textStyle.color = '#f1f5f9';

                        // Robustness: Ensure title is an object (ECharts requirement)
                        if (option.title && typeof option.title === 'string') {
                            option.title = {
                                text: option.title,
                                left: "center",
                                textStyle: { color: "#f1f5f9" }
                            };
                        }
                        
                        const chart = echarts.init(container);
                        chart.setOption(option);
                        container.setAttribute('data-initialized', 'true');
                        
                        // Resize handling
                        window.addEventListener('resize', () => chart.resize());
                    } catch (e) {
                        console.error('Failed to init chart', e);
                        container.innerHTML = `<div style="color:red; padding:10px;">Chart Error: ${e.message}</div>`;
                    }
                });
            }
            
            currentAiContainer = null;
            currentAiSummary = null;
            currentAiDetail = null;
            currentFullText = "";
        }

        function setStatus(text) {
            const badge = document.querySelector('.status-badge');
            if (badge) badge.textContent = text;
        }

        function setAssistantStatus(status) {
            const icon = document.getElementById('assistantIcon');
            if (!icon) return;
            
            if (status === 'awake') {
                icon.textContent = '🤖'; // Awake
                // Optional: Add some animation or color change
            } else {
                icon.textContent = '💤'; // Sleep
            }
        }

        // Device Management
        const micSelect = document.getElementById('micSelect');

        function setDeviceList(devices) {
            micSelect.innerHTML = ''; // Clear existing
            
            if (devices.length === 0) {
                const option = document.createElement('option');
                option.text = "未找到音频设备";
                micSelect.add(option);
                return;
            }

            devices.forEach(device => {
                const option = document.createElement('option');
                option.value = device;
                option.text = device;
                micSelect.add(option);
            });
        }

        function setCurrentDevice(deviceName) {
             micSelect.value = deviceName;
        }

        micSelect.onchange = function() {
            if (backend && micSelect.value) {
                backend.trigger_select_device(micSelect.value);
            }
        };

        // Bind buttons
        // Note: btn-update is in the header
        document.querySelector('.btn-update').onclick = function() {
            if (backend) {
                backend.trigger_update_kb();
            }
        };

        // --- Text/Voice Mode Switching ---
        let isTextMode = false;
        // Elements
        const statusBadgeElement = document.getElementById('statusBadge');
        const textInputAreaElement = document.getElementById('textInputArea');
        const modeToggleBtnElement = document.getElementById('modeToggleBtn');
        const messageInputElement = document.getElementById('messageInput');
        const floatingMicElement = document.querySelector('.floating-mic-container'); 

        function toggleInputMode() {
            isTextMode = !isTextMode;
            
            if (backend) {
                backend.trigger_switch_mode(isTextMode ? 'text' : 'voice');
            }
            
            if (isTextMode) {
                // Switch to Text Mode
                if(micSelect) micSelect.classList.add('hidden');
                if(statusBadgeElement) statusBadgeElement.classList.add('hidden');
                if(floatingMicElement) floatingMicElement.classList.add('hidden');
                
                textInputAreaElement.classList.remove('hidden');
                
                modeToggleBtnElement.innerHTML = '🎙️'; 
                modeToggleBtnElement.title = "切换到语音模式";
                
                // Focus input
                setTimeout(() => messageInputElement.focus(), 100);
            } else {
                // Switch to Voice Mode
                if(micSelect) micSelect.classList.remove('hidden');
                if(statusBadgeElement) statusBadgeElement.classList.remove('hidden');
                if(floatingMicElement) floatingMicElement.classList.remove('hidden');
                
                textInputAreaElement.classList.add('hidden');
                
                modeToggleBtnElement.innerHTML = '⌨️'; 
                modeToggleBtnElement.title = "切换到文字模式";
            }
            scrollToBottom();
        }

        function sendText() {
            const text = messageInputElement.value.trim();
            if (!text) return;
            
            // Add user message to UI immediately
            addUserMessage(text);
            
            if (backend) {
                backend.trigger_text_input(text);
                messageInputElement.value = '';
                messageInputElement.style.height = '42px'; // Reset height
            }
        }

        // Auto-resize textarea
        messageInputElement.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Handle Enter to send
        messageInputElement.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendText();
            }
        });

    </script>
</body>
</html>
